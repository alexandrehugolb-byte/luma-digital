<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Banner WhatsApp — Luma Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:24px; font-family:'Inter',sans-serif; padding:32px; }
p { color:#666; font-size:13px; }
button {
  background:#7c3aed; color:white; border:none;
  padding:14px 36px; border-radius:10px; font-size:15px;
  cursor:pointer; font-family:'Inter',sans-serif; font-weight:600;
}
button:hover { background:#6d28d9; }
canvas { max-width:100%; border-radius:8px; display:block; }
</style>
</head>
<body>

<p>Preview do banner (1600 × 400px)</p>
<canvas id="c"></canvas>
<button onclick="download()">⬇ Baixar PNG — Banner WhatsApp</button>
<p>Arquivo: luma-digital-banner-whatsapp.png</p>

<script>
const W = 1600, H = 400;
const canvas = document.getElementById('c');
canvas.width = W;
canvas.height = H;
canvas.style.maxWidth = '900px';
canvas.style.width = '100%';
canvas.style.height = 'auto';

const ctx = canvas.getContext('2d');

function drawLogo(ctx, cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i - Math.PI / 6;
    const px = cx + r * Math.cos(a), py = cy + r * Math.sin(a);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  const hg = ctx.createLinearGradient(cx-r, cy-r, cx+r, cy+r);
  hg.addColorStop(0, 'rgba(167,139,250,0.25)');
  hg.addColorStop(1, 'rgba(109,40,217,0.15)');
  ctx.fillStyle = hg;
  ctx.fill();
  ctx.strokeStyle = '#a78bfa';
  ctx.lineWidth = 3;
  ctx.stroke();

  // L
  ctx.beginPath();
  ctx.moveTo(cx - r*0.28, cy - r*0.42);
  ctx.lineTo(cx - r*0.28, cy + r*0.40);
  ctx.lineTo(cx + r*0.38, cy + r*0.40);
  ctx.strokeStyle = '#a78bfa';
  ctx.lineWidth = r * 0.14;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  // dot
  ctx.beginPath();
  ctx.arc(cx + r*0.38, cy + r*0.40, r*0.07, 0, Math.PI*2);
  ctx.fillStyle = '#c4b5fd';
  ctx.fill();

  // rays
  ctx.strokeStyle = 'rgba(167,139,250,0.5)';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - r*0.28, cy - r*0.42);
  ctx.lineTo(cx - r*0.52, cy - r*0.66);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(167,139,250,0.3)';
  ctx.beginPath();
  ctx.moveTo(cx - r*0.28, cy - r*0.42);
  ctx.lineTo(cx - r*0.60, cy - r*0.42);
  ctx.stroke();
}

function render() {
  // Background
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#06030f');
  bg.addColorStop(0.5, '#0d0720');
  bg.addColorStop(1, '#06030f');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Center glow
  const glow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 400);
  glow.addColorStop(0, 'rgba(124,58,237,0.18)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // Top + bottom border lines
  const line = ctx.createLinearGradient(0, 0, W, 0);
  line.addColorStop(0, 'transparent');
  line.addColorStop(0.3, '#7c3aed');
  line.addColorStop(0.7, '#a78bfa');
  line.addColorStop(1, 'transparent');
  ctx.fillStyle = line;
  ctx.fillRect(0, 0, W, 3);
  ctx.fillRect(0, H-3, W, 3);

  // Logo mark centered-left of text
  const cx = W/2 - 310, cy = H/2, r = 72;
  drawLogo(ctx, cx, cy, r);

  // Brand name
  ctx.textAlign = 'left';
  ctx.font = '900 100px Inter, sans-serif';
  const ng = ctx.createLinearGradient(W/2-210, 0, W/2+280, 0);
  ng.addColorStop(0, '#ffffff');
  ng.addColorStop(1, '#a78bfa');
  ctx.fillStyle = ng;
  ctx.fillText('Luma Digital', W/2 - 210, H/2 + 20);

  // Tagline
  ctx.font = '500 34px Inter, sans-serif';
  ctx.fillStyle = '#7c3aed';
  ctx.letterSpacing = '4px';
  ctx.fillText('PRESENÇA  ·  RESULTADO', W/2 - 210, H/2 + 72);
}

document.fonts.ready.then(() => {
  render();
});

function download() {
  const a = document.createElement('a');
  a.download = 'luma-digital-banner-whatsapp.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
