<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="150" y1="100" x2="350" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="hexFill" x1="150" y1="100" x2="350" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="lGrad" x1="170" y1="160" x2="330" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="250" cy="250" r="250" fill="url(#bg)"/>

  <!-- Subtle purple glow center -->
  <circle cx="250" cy="250" r="140" fill="#7c3aed" fill-opacity="0.06"/>

  <!-- Hexagon -->
  <polygon
    points="250,80 390,162 390,328 250,410 110,328 110,162"
    fill="url(#hexFill)"
    stroke="url(#hexGrad)"
    stroke-width="2.5"
  />

  <!-- Inner hexagon border glow -->
  <polygon
    points="250,80 390,162 390,328 250,410 110,328 110,162"
    fill="none"
    stroke="#a78bfa"
    stroke-width="1"
    stroke-opacity="0.3"
    filter="url(#glow)"
  />

  <!-- L shape -->
  <path
    d="M185 170 L185 310 L315 310"
    stroke="url(#lGrad)"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Accent dot at end of L -->
  <circle cx="315" cy="310" r="14" fill="#a78bfa" filter="url(#softglow)"/>
  <circle cx="315" cy="310" r="8" fill="#c4b5fd"/>

  <!-- Light rays from top of L -->
  <line x1="185" y1="170" x2="148" y2="133" stroke="#a78bfa" stroke-width="4" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="185" y1="170" x2="140" y2="170" stroke="#a78bfa" stroke-width="4" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="185" y1="170" x2="155" y2="148" stroke="#a78bfa" stroke-width="2.5" stroke-opacity="0.2" stroke-linecap="round"/>

</svg>
