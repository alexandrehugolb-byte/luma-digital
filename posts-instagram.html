// ─── CANVAS RENDERER ────────────────────────────────────
const W = 1080, H = 1080;
const BG = '#0a0a0f';
const PURPLE = '#7c3aed';
const LIGHT = '#a78bfa';
const WHITE = '#ffffff';
const GRAY = '#888888';
const DARK2 = '#111118';

function wrapText(ctx, text, x, y, maxW, lh) {
  const lines = text.split('\n');
  let cy = y;
  lines.forEach(line => {
    const words = line.split(' ');
    let cur = '';
    words.forEach((word, i) => {
      const test = cur + (cur ? ' ' : '') + word;
      if (ctx.measureText(test).width > maxW && cur) {
        ctx.fillText(cur, x, cy);
        cy += lh;
        cur = word;
      } else {
        cur = test;
      }
    });
    if (cur) { ctx.fillText(cur, x, cy); cy += lh; }
  });
  return cy;
}

function drawBG(ctx, variant) {
  if (variant === 'purple') {
    const g = ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0, '#5b21b6');
    g.addColorStop(1, '#3b0764');
    ctx.fillStyle = g;
  } else {
    ctx.fillStyle = BG;
  }
  ctx.fillRect(0, 0, W, H);

  // subtle grid lines
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 1;
  for (let i = 0; i < W; i += 120) {
    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke();
  }
  for (let i = 0; i < H; i += 120) {
    ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke();
  }

  // corner accent
  ctx.strokeStyle = PURPLE + '44';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(120,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,120); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W,H); ctx.lineTo(W-120,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W,H); ctx.lineTo(W,H-120); ctx.stroke();
}

function drawFooter(ctx, slideNum) {
  // brand name
  ctx.font = '500 28px Inter, sans-serif';
  ctx.fillStyle = '#444';
  ctx.textAlign = 'left';
  ctx.fillText('@lumadigitalbr', 60, H-52);

  // slide num
  ctx.font = '500 28px Inter, sans-serif';
  ctx.fillStyle = '#333';
  ctx.textAlign = 'right';
  ctx.fillText(slideNum, W-60, H-52);

  // line
  ctx.strokeStyle = '#1e1e2e';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(60, H-80); ctx.lineTo(W-60, H-80); ctx.stroke();

  // mini logo mark
  drawMiniLogo(ctx, W/2, H-52);
}

function drawMiniLogo(ctx, cx, cy) {
  const r = 18;
  ctx.beginPath();
  for (let i=0;i<6;i++) {
    const a = (Math.PI/3)*i - Math.PI/6;
    const px = cx + r*Math.cos(a), py = cy + r*Math.sin(a);
    i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.strokeStyle = PURPLE;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(cx-r*0.3, cy-r*0.45);
  ctx.lineTo(cx-r*0.3, cy+r*0.42);
  ctx.lineTo(cx+r*0.42, cy+r*0.42);
  ctx.strokeStyle = LIGHT;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx+r*0.42, cy+r*0.42, 4, 0, Math.PI*2);
  ctx.fillStyle = LIGHT;
  ctx.fill();
}

function drawPurpleLine(ctx, x, y, w=80) {
  ctx.fillStyle = PURPLE;
  ctx.beginPath();
  ctx.roundRect(x, y, w, 6, 3);
  ctx.fill();
}

// ─── SLIDE TYPE RENDERERS ───────────────────────────────

function renderCover(ctx, slide) {
  drawBG(ctx);

  // top purple accent
  drawPurpleLine(ctx, 60, 70, 60);

  // big headline
  ctx.font = '900 96px Inter, sans-serif';
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'left';
  wrapText(ctx, slide.h, 60, 200, W-120, 108);

  // sub
  ctx.font = '500 42px Inter, sans-serif';
  ctx.fillStyle = LIGHT;
  wrapText(ctx, slide.s, 60, 600, W-120, 54);

  // big decorative L as background element
  ctx.font = '900 500px Inter, sans-serif';
  ctx.fillStyle = PURPLE + '08';
  ctx.textAlign = 'right';
  ctx.fillText('L', W+80, H-100);
  ctx.textAlign = 'left';

  drawFooter(ctx, slide.n);
}

function renderContent(ctx, slide) {
  drawBG(ctx);

  // big number background
  ctx.font = '900 260px Inter, sans-serif';
  ctx.fillStyle = PURPLE + '15';
  ctx.textAlign = 'right';
  ctx.fillText(slide.num, W-40, 380);
  ctx.textAlign = 'left';

  // accent
  drawPurpleLine(ctx, 60, 80, 50);

  // num label
  ctx.font = '700 52px Inter, sans-serif';
  ctx.fillStyle = PURPLE;
  ctx.textAlign = 'left';
  ctx.fillText(slide.num, 60, 160);

  // title
  ctx.font = '900 88px Inter, sans-serif';
  ctx.fillStyle = WHITE;
  const titleEnd = wrapText(ctx, slide.title, 60, 280, W-120, 100);

  // body
  ctx.font = '400 40px Inter, sans-serif';
  ctx.fillStyle = '#aaa';
  wrapText(ctx, slide.body, 60, titleEnd + 50, W-120, 58);

  drawFooter(ctx, slide.n);
}

function renderVersus(ctx, slide) {
  drawBG(ctx);
  drawPurpleLine(ctx, 60, 80, 50);

  // icon
  ctx.font = '140px serif';
  ctx.textAlign = 'center';
  ctx.fillText(slide.icon, W/2, 320);

  // side label
  ctx.font = '900 96px Inter, sans-serif';
  ctx.fillStyle = LIGHT;
  ctx.textAlign = 'center';
  ctx.fillText(slide.side, W/2, 460);

  // divider
  ctx.strokeStyle = PURPLE + '66';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(180, 510); ctx.lineTo(W-180, 510); ctx.stroke();

  // body
  ctx.font = '400 40px Inter, sans-serif';
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'center';
  wrapText(ctx, slide.body, W/2 - (W-160)/2, 580, W-160, 58);

  drawFooter(ctx, slide.n);
}

function renderCTA(ctx, slide) {
  // gradient bg
  const g = ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0, '#0f0a1e');
  g.addColorStop(1, '#1a0535');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // decorative circle
  ctx.beginPath();
  ctx.arc(W/2, H/2-100, 380, 0, Math.PI*2);
  ctx.strokeStyle = PURPLE + '22';
  ctx.lineWidth = 80;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(W/2, H/2-100, 240, 0, Math.PI*2);
  ctx.strokeStyle = PURPLE + '15';
  ctx.lineWidth = 60;
  ctx.stroke();

  // message
  ctx.font = '700 76px Inter, sans-serif';
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center';
  const msgLines = slide.msg.split('\n');
  let y = 280;
  msgLines.forEach(line => { ctx.fillText(line, W/2, y); y += 92; });

  // CTA button
  const btnY = 680;
  const btnW = 780, btnH = 120, btnX = (W-btnW)/2;
  ctx.fillStyle = PURPLE;
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnW, btnH, 20);
  ctx.fill();

  ctx.font = '600 40px Inter, sans-serif';
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center';
  const ctaLines = slide.cta.split('\n');
  ctaLines.forEach((line, i) => ctx.fillText(line, W/2, btnY + 52 + i*46));

  drawFooter(ctx, slide.n);
}

function renderPresentation(ctx, slide) {
  drawBG(ctx);

  // center logo big
  const cx = W/2, cy = 350;
  const r = 140;
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=(Math.PI/3)*i-Math.PI/6;
    const px=cx+r*Math.cos(a), py=cy+r*Math.sin(a);
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.strokeStyle = PURPLE;
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = PURPLE+'18';
  ctx.fill();

  // L in center
  ctx.beginPath();
  ctx.moveTo(cx-r*0.3, cy-r*0.45);
  ctx.lineTo(cx-r*0.3, cy+r*0.42);
  ctx.lineTo(cx+r*0.4, cy+r*0.42);
  ctx.strokeStyle = LIGHT;
  ctx.lineWidth = 18;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx+r*0.4, cy+r*0.42, 16, 0, Math.PI*2);
  ctx.fillStyle = LIGHT;
  ctx.fill();

  // name
  ctx.font = '900 100px Inter, sans-serif';
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center';
  ctx.fillText('Luma Digital', W/2, 570);

  // tagline
  ctx.font = '400 40px Inter, sans-serif';
  ctx.fillStyle = GRAY;
  ctx.fillText('Presença digital para negócios locais', W/2, 638);

  // divider
  drawPurpleLine(ctx, W/2-40, 680, 80);

  // three features
  const feats = ['Sites Profissionais', 'Negócios Locais', 'Entrega Rápida'];
  const fw = 280, fh = 90, gap = 30;
  const totalW = feats.length*(fw+gap)-gap;
  let fx = (W-totalW)/2;
  feats.forEach(f => {
    ctx.fillStyle = DARK2;
    ctx.strokeStyle = PURPLE+'55';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(fx, 720, fw, fh, 12);
    ctx.fill();
    ctx.stroke();

    ctx.font = '600 30px Inter, sans-serif';
    ctx.fillStyle = LIGHT;
    ctx.textAlign = 'center';
    ctx.fillText(f, fx+fw/2, 720+fh/2+10);
    fx += fw+gap;
  });

  drawFooter(ctx, slide.n);
}

function renderMockup(ctx, slide) {

  drawPurpleLine(ctx, 60, 70, 60);

  ctx.font = '700 52px Inter, sans-serif';
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center';
  ctx.fillText('É assim que seu negócio', W/2, 160);
  ctx.fillText('pode parecer online', W/2, 222);

  // browser window
  const bx=100, by=280, bw=880, bh=560, br=16;
  ctx.fillStyle = '#1a1a2e';
  ctx.strokeStyle = PURPLE+'66';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,br); ctx.fill(); ctx.stroke();

  // browser bar
  ctx.fillStyle = '#111130';
  ctx.beginPath(); ctx.roundRect(bx,by,bw,56,{upperLeft:br,upperRight:br,lowerLeft:0,lowerRight:0}); ctx.fill();

  // dots
  [[bx+24,'#ef4444'],[bx+56,'#f59e0b'],[bx+88,'#22c55e']].forEach(([x,c])=>{
    ctx.beginPath(); ctx.arc(x,by+28,10,0,Math.PI*2); ctx.fillStyle=c; ctx.fill();
  });

  // url bar
  ctx.fillStyle = '#0a0a1a';
  ctx.beginPath(); ctx.roundRect(bx+120,by+16,500,26,6); ctx.fill();
  ctx.font = '400 18px Inter, sans-serif';
  ctx.fillStyle = '#555';
  ctx.textAlign = 'left';
  ctx.fillText('www.seunegocio.com.br', bx+134, by+34);

  // hero area inside browser
  const hx=bx+20, hy=by+76, hw=bw-40, hh=180;
  const hg = ctx.createLinearGradient(hx,hy,hx+hw,hy);
  hg.addColorStop(0, PURPLE+'cc'); hg.addColorStop(1, '#4c1d95cc');
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.roundRect(hx,hy,hw,hh,8); ctx.fill();

  ctx.font = '700 36px Inter, sans-serif';
  ctx.fillStyle = WHITE; ctx.textAlign = 'center';
  ctx.fillText('Clínica Exemplo', W/2, hy+60);
  ctx.font = '400 22px Inter, sans-serif';
  ctx.fillStyle = '#c4b5fd';
  ctx.fillText('Cuidando do seu sorriso há 10 anos', W/2, hy+100);

  // cta btn inside
  ctx.fillStyle = WHITE;
  ctx.beginPath(); ctx.roundRect(W/2-120,hy+125,240,44,8); ctx.fill();
  ctx.font = '600 20px Inter, sans-serif';
  ctx.fillStyle = PURPLE; ctx.textAlign = 'center';
  ctx.fillText('Agendar Consulta', W/2, hy+153);

  // cards inside browser
  [[bx+40,by+290,'Serviços','Limpeza · Clareamento · Implante'],
   [bx+310,by+290,'Horários','Seg–Sex: 8h–18h · Sáb: 8h–12h'],
   [bx+580,by+290,'Localização','R. Exemplo, 123\nNiterói – RJ']].forEach(([x,y,t,b])=>{
    ctx.fillStyle='#0a0a20'; ctx.strokeStyle=PURPLE+'33'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(x,y,240,180,8); ctx.fill(); ctx.stroke();
    ctx.font='600 22px Inter, sans-serif'; ctx.fillStyle=LIGHT; ctx.textAlign='left';
    ctx.fillText(t,x+16,y+36);
    ctx.font='400 18px Inter, sans-serif'; ctx.fillStyle='#888';
    wrapText(ctx,b,x+16,y+72,210,26);
  });

  // badge
  ctx.fillStyle = PURPLE;
  ctx.beginPath(); ctx.roundRect(60,H-200,320,60,10); ctx.fill();
  ctx.font = '600 26px Inter, sans-serif';
  ctx.fillStyle = WHITE; ctx.textAlign = 'center';
  ctx.fillText('✦ Feito pela Luma Digital', 60+160, H-200+40);

  ctx.font = '400 34px Inter, sans-serif';
  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  ctx.fillText('Quer o seu? Link na bio 👇', W/2, H-120);

  drawFooter(ctx, slide.n);
}

function renderImpact(ctx, slide) {
  // Split design: left half dark, right half purple
  ctx.fillStyle = '#06040f';
  ctx.fillRect(0, 0, W, H);

  // Right purple half
  const g = ctx.createLinearGradient(W*0.45, 0, W, H);
  g.addColorStop(0, '#5b21b6');
  g.addColorStop(1, '#3b0764');
  ctx.fillStyle = g;
  ctx.fillRect(W*0.45, 0, W*0.55, H);

  // Diagonal separator
  ctx.fillStyle = '#06040f';
  ctx.beginPath();
  ctx.moveTo(W*0.45, 0);
  ctx.lineTo(W*0.58, 0);
  ctx.lineTo(W*0.45, H);
  ctx.closePath();
  ctx.fill();

  // Glowing vertical line on separator
  const gl = ctx.createLinearGradient(0, 0, 0, H);
  gl.addColorStop(0, 'transparent');
  gl.addColorStop(0.3, LIGHT);
  gl.addColorStop(0.7, PURPLE);
  gl.addColorStop(1, 'transparent');
  ctx.strokeStyle = gl;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(W*0.505, 40);
  ctx.lineTo(W*0.505, H-40);
  ctx.stroke();

  // LEFT SIDE — "SEM SITE"
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W*0.50, H);
  ctx.clip();

  ctx.font = '900 38px Inter, sans-serif';
  ctx.fillStyle = '#333';
  ctx.textAlign = 'center';
  ctx.fillText('SEM SITE', W*0.245, 160);

  // X icon
  ctx.font = '900 180px Inter, sans-serif';
  ctx.fillStyle = '#1a1a1a';
  ctx.textAlign = 'center';
  ctx.fillText('✕', W*0.245, 420);

  const leftItems = ['Invisível no Google','Sem credibilidade','Perdendo clientes','Dependendo do algoritmo'];
  ctx.font = '400 32px Inter, sans-serif';
  ctx.fillStyle = '#444';
  leftItems.forEach((item, i) => {
    ctx.fillText(item, W*0.245, 540 + i*70);
  });
  ctx.restore();

  // RIGHT SIDE — "COM SITE"
  ctx.save();
  ctx.beginPath();
  ctx.rect(W*0.51, 0, W*0.49, H);
  ctx.clip();

  ctx.font = '900 38px Inter, sans-serif';
  ctx.fillStyle = '#c4b5fd';
  ctx.textAlign = 'center';
  ctx.fillText('COM SITE', W*0.755, 160);

  // Check icon
  ctx.font = '900 160px Inter, sans-serif';
  ctx.fillStyle = 'rgba(167,139,250,0.25)';
  ctx.textAlign = 'center';
  ctx.fillText('✓', W*0.755, 415);

  const rightItems = ['Encontrado 24h','Confiança imediata','Atraindo clientes','Sua propriedade digital'];
  ctx.font = '600 32px Inter, sans-serif';
  ctx.fillStyle = '#e9d5ff';
  rightItems.forEach((item, i) => {
    ctx.fillText(item, W*0.755, 540 + i*70);
  });
  ctx.restore();

  // BOTTOM CTA BAR
  ctx.fillStyle = PURPLE;
  ctx.fillRect(0, H-180, W, 180);

  ctx.font = '900 56px Inter, sans-serif';
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center';
  ctx.fillText('Seu concorrente já está online.', W/2, H-110);

  ctx.font = '600 40px Inter, sans-serif';
  ctx.fillStyle = '#c4b5fd';
  ctx.fillText('E você? → Link na bio', W/2, H-56);

  ctx.textAlign = 'left';
  drawFooter(ctx, slide.n);
}

// ─── RENDER SLIDE ────────────────────────────────────────

function renderSlide(canvas, slide) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  switch(slide.t) {
    case 'cover':        renderCover(ctx,slide); break;
    case 'content':      renderContent(ctx,slide); break;
    case 'versus':       renderVersus(ctx,slide); break;
    case 'cta':          renderCTA(ctx,slide); break;
    case 'presentation': renderPresentation(ctx,slide); break;
    case 'mockup':       renderMockup(ctx,slide); break;
    case 'impact':       renderImpact(ctx,slide); break;
  }
}

// ─── BUILD UI ────────────────────────────────────────────

function buildUI() {
  const app = document.getElementById('app');

  POSTS.forEach((post, pi) => {
    const block = document.createElement('div');
    block.className = 'post-block';

    block.innerHTML = `
      ${pi > 0 ? '<hr style="margin-bottom:40px;">' : ''}
      <div class="post-header">
        <div class="post-num">Post ${post.id}</div>
        <div class="post-name">${post.title} <span class="badge">${post.type}</span></div>
      </div>
      <div class="slides-row" id="row-${post.id}"></div>
    `;
    app.appendChild(block);

    const row = block.querySelector(`#row-${post.id}`);

    post.slides.forEach((slide, si) => {
      const wrap = document.createElement('div');
      wrap.className = 'slide-wrap';

      const label = document.createElement('div');
      label.className = 'slide-label';
      label.textContent = `SLIDE ${si+1}`;

      const canvas = document.createElement('canvas');
      canvas.className = 'preview';
      canvas.width = W;
      canvas.height = H;
      canvas.style.width = '220px';
      canvas.style.height = '220px';

      const btn = document.createElement('button');
      btn.className = 'dl-btn';
      btn.textContent = `⬇ Baixar PNG — Slide ${si+1}`;
      btn.onclick = () => {
        const a = document.createElement('a');
        a.download = `luma-post${post.id}-slide${si+1}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      };

      wrap.appendChild(label);
      wrap.appendChild(canvas);
      wrap.appendChild(btn);
      row.appendChild(wrap);

      // render after fonts ready
      document.fonts.ready.then(() => renderSlide(canvas, slide));
    });
  });
}

document.fonts.ready.then(() => {
  buildUI();
});
  </script>
